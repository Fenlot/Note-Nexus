<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="NoteNexus - Smart productivity app for notes and tasks">
    <title>note-nexus-client</title>
    <base href="/" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
</head>

<body>
    <script>
        if (localStorage.getItem("theme") === "dark") {
            document.documentElement.classList.add("dark");
            document.body.classList.add("dark");
        }
    </script>

    <div id="app">
        <div class="splash-container">
            <div class="splash-content" style="display: flex; flex-direction: column; align-items: center; gap: 40px;">
                <div class="brand-composite brand-splash">
                    <img src="images/notenexus_icon_only.svg" alt="NoteNexus Logo"
                        class="brand-composite-img splash-icon-pulse" />
                    <div class="brand-composite-text-block">
                        <div class="brand-composite-title">NoteNexus</div>
                        <div class="brand-composite-line"></div>
                        <div class="brand-composite-subtitle">WRITE.PLAN.EXECUTE</div>
                    </div>
                </div>
                <div class="splash-spinner"></div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="js/theme.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>

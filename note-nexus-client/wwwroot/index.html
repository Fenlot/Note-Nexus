<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="NoteNexus - Your second brain for notes and tasks">
    <title>NoteNexus</title>
    <base href="/" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/dashboard-redesign.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
</head>

<body>
    <div id="app">
        <div class="nn-root" style="height:100vh; justify-content:center; align-items:center;">
            <div style="display:flex; flex-direction:column; align-items:center; gap:24px; animation: fadeIn 0.8s ease-out;">
                <div class="nn-logo-mark" style="font-size:32px; gap:12px;">
                    <span class="nn-logo-dot" style="width:12px; height:12px;"></span>
                    NoteNexus
                </div>
                <div class="nn-logo-sub" style="font-size:12px;">Loading your second brain...</div>
                <div style="width:40px; height:40px; border:2px solid rgba(255,255,255,0.1); border-top-color:rgba(167,139,250,0.6); border-radius:50%; animation:spin 0.8s linear infinite;"></div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>

    <script src="js/theme.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>

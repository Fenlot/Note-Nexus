events { }
http {
    include mime.types;
    types {
        application/wasm wasm;
    }

    server {
        listen 80;
        index index.html;
        root /usr/share/nginx/html;

        # The critical fix for Blazor SPAs:
        # Try to find the exact file, if not found, fallback to index.html
        location / {
            try_files $uri $uri/ /index.html =404;
        }
    }
}